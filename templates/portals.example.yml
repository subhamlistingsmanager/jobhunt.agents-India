# Portal Scanner Configuration — Job Hunts Agent India
# Used by /jobhunt scan to discover new offers automatically.
#
# HOW TO USE:
#   1. Copy this file to portals.yml in the project root.
#   2. Edit title_filter.positive with YOUR target-role keywords.
#   3. Turn companies on/off (enabled: true/false) and add your own.
#   4. Adjust search_queries for the Indian job boards you care about.
#
# TWO KINDS OF SOURCES (see docs/INDIAN-JOB-SOURCES.md for the full guide):
#
#   A) ATS-backed (zero-token, fully automatic): companies on Greenhouse / Lever /
#      Ashby / Workable / SmartRecruiters / Recruitee. Many Indian product startups
#      use these — the scanner hits their public JSON/career pages directly.
#
#   B) Indian job boards WITHOUT public APIs (Naukri, LinkedIn India, Instahyre,
#      Cutshort, Hirist, Foundit, Wellfound, IIMJobs, Internshala, Unstop): these
#      can't be scanned token-free. Use them two ways:
#         • run the `search_queries` below (WebSearch with site: filters), OR
#         • paste a specific role URL into data/pipeline.md and run `/jobhunt pipeline`.

# -- Scan history recheck policy (optional) --
# URLs in data/scan-history.tsv are deduped forever by default. Uncomment to let
# previously-seen URLs become eligible again after N days (roles that reopen).
# scan_history:
#   recheck_after_days: 30

# -- Location filter (optional) --
# Filter scanned jobs by location. Case-insensitive substring match.
# Order: empty location passes → always_allow wins → block rejects → allow must match.
# Tuned for India below. Uncomment and edit to your target cities.
#
# location_filter:
#   always_allow:
#     - "Remote"
#     - "India"
#   allow:
#     - "Bengaluru"
#     - "Bangalore"
#     - "Hyderabad"
#     - "Pune"
#     - "Gurgaon"
#     - "Gurugram"
#     - "Noida"
#     - "Mumbai"
#     - "Chennai"
#     - "Delhi"
#     - "Remote"
#     - "India"
#   block:
#     - "United States"
#     - "United Kingdom"
#     - "Singapore"
#     - "Germany"

# -- Salary filter (optional) --
# Annual CTC filter. In India quote values in rupees (LPA × 100000).
# Only applies when a job exposes structured salary (most Indian listings don't,
# so this rarely fires — it's a safety net, not the main filter).
# Example: target roles paying at least ₹20 LPA, no upper limit.
# salary_filter:
#   min: 2000000       # ₹20,00,000 = 20 LPA
#   max: 0             # 0 = no upper limit
#   currency: "INR"

# -- Title filter --
# At least 1 positive must match AND 0 negatives (case-insensitive).
# [CUSTOMIZE] These are generic software examples — replace with YOUR field's
# keywords (data, QA, DevOps, product, design, finance, sales, etc.).

title_filter:
  positive:
    - "Software Engineer"
    - "SDE"
    - "Backend"
    - "Frontend"
    - "Full Stack"
    - "Full-Stack"
    - "Platform Engineer"
    - "DevOps"
    - "Data Engineer"
    - "Data Scientist"
    - "Machine Learning"
    - "ML Engineer"
    - "AI Engineer"
    - "Product Manager"
    - "QA"
    - "SDET"
    - "Mobile"
    - "Android"
    - "iOS"
  negative:
    # Roles you want to exclude. Freshers: remove "Intern" if you want internships.
    - "Sales"
    - "Telecaller"
    - "Field"
    - "BPO"
  seniority_boost:
    # Add relevance but not required
    - "Senior"
    - "Staff"
    - "Lead"
    - "Principal"
    - "SDE II"
    - "SDE III"

# -- Search queries --
# Each query runs a WebSearch. The scanner extracts title, URL, company from results.
# These target Indian job boards that have no public API. Turn on the ones you use.
# [CUSTOMIZE] Replace the quoted role keywords with YOUR target roles.

search_queries:

  # ── Naukri (India's largest job board) ──
  - name: Naukri — SDE / Backend
    query: 'site:naukri.com "Software Engineer" OR "Backend Developer" OR "SDE" Bengaluru OR Hyderabad OR remote'
    enabled: true

  # ── LinkedIn India ──
  - name: LinkedIn — SDE India
    query: 'site:linkedin.com/jobs "Software Engineer" OR "Backend Engineer" OR "Full Stack" India Bengaluru OR Hyderabad OR Pune'
    enabled: true

  # ── Instahyre (curated tech, India) ──
  - name: Instahyre — Engineering
    query: 'site:instahyre.com "Software Engineer" OR "Backend" OR "Full Stack" OR "SDE"'
    enabled: true

  # ── Cutshort (startup tech, India) ──
  - name: Cutshort — Engineering
    query: 'site:cutshort.io "Software Engineer" OR "Backend Developer" OR "Full Stack Developer"'
    enabled: true

  # ── Hirist (tech-only, India) ──
  - name: Hirist — Backend / Full Stack
    query: 'site:hirist.tech OR site:hirist.com "Backend" OR "Full Stack" OR "Java" OR "Python" OR "SDE"'
    enabled: true

  # ── Wellfound / AngelList (startups) ──
  - name: Wellfound — India Startups
    query: 'site:wellfound.com "Software Engineer" OR "Founding Engineer" OR "Backend" India OR Bengaluru OR remote'
    enabled: true

  # ── Foundit (ex-Monster India) ──
  - name: Foundit — Engineering
    query: 'site:foundit.in "Software Engineer" OR "Backend Developer" OR "Full Stack"'
    enabled: false

  # ── IIMJobs (MBA / finance / leadership / product) ──
  - name: IIMJobs — Product / Strategy
    query: 'site:iimjobs.com "Product Manager" OR "Strategy" OR "Business Analyst"'
    enabled: false

  # ── Internshala (internships & fresher roles) ──
  - name: Internshala — Tech Internships
    query: 'site:internshala.com "Software Development" OR "Backend" OR "Web Development" internship'
    enabled: false

  # ── Unstop (campus hiring, competitions, fresher jobs) ──
  - name: Unstop — Fresher / Campus
    query: 'site:unstop.com "Software Engineer" OR "Graduate Engineer Trainee" OR "SDE" fresher 2025 OR 2026'
    enabled: false

  # ── ATS aggregators (Indian startups on Greenhouse / Lever / Ashby) ──
  - name: Greenhouse — India SDE
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Software Engineer" OR "Backend" India OR Bengaluru'
    enabled: true

  - name: Lever — India SDE
    query: 'site:jobs.lever.co "Software Engineer" OR "Backend" OR "Full Stack" India OR Bengaluru'
    enabled: true

  - name: Ashby — India Engineering
    query: 'site:jobs.ashbyhq.com "Software Engineer" OR "Backend" OR "Full Stack" India OR Bengaluru OR remote'
    enabled: true

# -- Tracked companies --
# Indian product companies and startups whose career pages are checked directly.
# Many use Greenhouse / Lever / Ashby (auto-detected from careers_url). Where the
# ATS slug isn't certain, scan_method: websearch is used as a safe default — the
# agent / you can later pin an exact `api:` or ATS URL for faster, token-free scans.
#
# scan_method: playwright (default) | websearch | local_parser
# Verify a company's real careers URL before relying on it; slugs change.

