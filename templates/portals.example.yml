# ── Advanced: local parsers for SSR/static career pages (optional) ──
# For a company whose careers page renders server-side (no ATS, no JS), you can
# point it at a small local script that prints jobs as JSON to stdout:
#   [{ "title": "...", "url": "...", "location": "..." }]
# Most parser scripts already know their target careers URL; `args` are optional.
#
# JavaScript parser:
# - name: Example JS Company
#   careers_url: https://example.com/careers
#   scan_method: local_parser
#   parser:
#     command: node
#     script: scripts/parsers/example-js-company-jobs.js
#     format: jobs-json-v1
#   enabled: true
#
# Python parser:
# - name: Example Python Company
#   careers_url: https://example.org/jobs
#   scan_method: local_parser
#   parser:
#     command: python3
#     script: scripts/parsers/example_python_company_jobs.py
#     format: jobs-json-v1
#   enabled: true

# ── Note on large IT services (TCS / Infosys / Wipro / HCL / Accenture / Cognizant) ──
# These hire at huge volume but post on their own portals (often Workday / Darwinbox /
# SuccessFactors) with no public ATS API. Don't scan them here — instead:
#   • Apply via their official careers site or campus drives, and
#   • paste a specific role URL into data/pipeline.md, then run `/jobhunt pipeline`.
# See docs/INDIAN-JOB-SOURCES.md.
